<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chamar Garçom — Espeto & Brasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .cliente-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .mesa-tag {
    font-family: var(--font-display);
    font-size: 20px;
    letter-spacing: .1em;
    color: var(--brass);
    margin-bottom: 6px;
  }
  .mesa-numero-hero {
    font-family: var(--font-display);
    font-size: 96px;
    line-height: 1;
    margin-bottom: 28px;
    text-shadow: 0 0 40px rgba(232,98,44,0.35);
  }
  .call-btn {
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--ember), var(--ember-dim));
    border: none; color: #1a0f08;
    font-family: var(--font-display);
    font-size: 28px; letter-spacing: .04em;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 10px 40px rgba(232,98,44,0.35);
  }
  .call-btn:active { transform: scale(0.97); }
  .status-line { margin-top: 30px; font-size: 15px; color: var(--smoke); min-height: 22px; }
  .picker { margin-top: 40px; }
  .picker select {
    background: var(--charcoal-2); color: var(--cream); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 14px; font-size: 15px;
  }
</style>
</head>
<body>
  <div class="cliente-wrap">
    <div id="app">Carregando mesa…</div>
  </div>

  <div id="toast-region"></div>

  <script src="config.js"></script>
  <script src="store.js"></script>
  <script src="api.js"></script>
  <script src="realtime.js"></script>
  <script src="service.js"></script>
  <script src="common.js"></script>
  <script>
    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    let mesaId = params.get("mesa");
    let mesaAtual = null;
    let atendimentoAtual = null;

    async function init() {
      if (!mesaId) {
        renderPicker();
        return;
      }
      mesaAtual = await Service.buscarMesa(mesaId);
      if (!mesaAtual) { app.innerHTML = `<p>Mesa não encontrada. Confira o QR Code.</p>`; return; }
      const ats = await Service.buscarAtendimentosDaMesa(mesaAtual.id);
      atendimentoAtual = ats.find((a) => a.status !== "FINALIZADO") || null;
      render();
    }

    function renderPicker() {
      // Apenas para demonstração local — em produção o QR Code já traz ?mesa=<id>
      Service.listarMesas().then((mesas) => {
        app.innerHTML = `
          <div class="mesa-tag">DEMONSTRAÇÃO</div>
          <p style="color:var(--smoke); max-width:320px;">Nenhuma mesa foi informada na URL. Em produção, o QR Code físico já inclui <code>?mesa=ID</code>. Selecione uma mesa para simular:</p>
          <div class="picker">
            <select id="mesaSelect">
              ${mesas.map((m) => `<option value="${m.id}">Mesa ${m.numero}</option>`).join("")}
            </select>
          </div>
          <button class="btn btn-primary" style="margin-top:18px;" onclick="irParaMesa()">Simular escaneamento</button>
        `;
      });
    }

    function irParaMesa() {
      const id = document.getElementById("mesaSelect").value;
      window.location.href = `index.html?mesa=${id}`;
    }

    function render() {
      const chamando = atendimentoAtual && atendimentoAtual.status !== "FINALIZADO";
      const statusTexto = !atendimentoAtual ? ""
        : atendimentoAtual.status === "AGUARDANDO" ? "Aguardando um garçom aceitar seu chamado…"
        : atendimentoAtual.status === "EM_ATENDIMENTO" ? `Em atendimento — ${atendimentoAtual.garcomNome || "garçom a caminho"} está indo até você.`
        : "";

      app.innerHTML = `
        <div class="mesa-tag">ESPETO &amp; BRASA</div>
        <div class="mesa-numero-hero">Mesa ${mesaAtual.numero}</div>
        <button id="callBtn" class="call-btn ${chamando && atendimentoAtual.status === "AGUARDANDO" ? "pulse-ember" : ""}" ${chamando ? "disabled" : ""}>
          ${chamando ? (atendimentoAtual.status === "AGUARDANDO" ? "Chamando…" : "Garçom a caminho") : "Chamar<br>Garçom"}
        </button>
        <div class="status-line">${statusTexto}</div>
      `;

      const btn = document.getElementById("callBtn");
      if (!chamando) {
        btn.addEventListener("click", async () => {
          btn.disabled = true;
          atendimentoAtual = await Service.chamarGarcom(mesaAtual.id);
          render();
        });
      }
    }

    // Reage em tempo real caso um garçom assuma ou finalize o atendimento
    Realtime.on("atendimento:atualizado", (at) => {
      if (mesaAtual && at.mesaId === mesaAtual.id) {
        atendimentoAtual = at.status === "FINALIZADO" ? null : at;
        render();
      }
    });

    init();
  </script>
</body>
</html>
