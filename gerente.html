<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Gerente — Espeto & Brasa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
  .layout { max-width: 1200px; margin:0 auto; padding:20px; }
  .kpi-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:14px; margin-bottom:24px; }
  .kpi-value { font-family: var(--font-display); font-size:38px; color:var(--ember); }
  .kpi-label { font-size:13px; color:var(--smoke); }
  .section-title { font-family: var(--font-display); font-size:22px; margin: 30px 0 14px; color:var(--brass); }
  .grid-mesas { display:grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:14px; }
  .charts-grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  @media (max-width: 860px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card { height: 320px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">Espeto<span>&amp;</span>Brasa <span style="color:var(--smoke); font-size:16px; -webkit-text-fill-color:var(--smoke);">/ Gerência</span></div>
    <div style="display:flex; gap:10px;">
      <a href="garcom.html" class="btn btn-outline">Painel do garçom</a>
      <a href="cozinha.html" class="btn btn-outline">Cozinha</a>
    </div>
  </div>

  <div class="layout">
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="section-title">Mesas — tempo de espera</div>
    <div class="grid-mesas" id="gridMesas"></div>

    <div class="section-title">Relatórios</div>
    <div class="charts-grid">
      <div class="card chart-card"><canvas id="chartProdutos"></canvas></div>
      <div class="card chart-card"><canvas id="chartRotatividade"></canvas></div>
    </div>
  </div>

  <div id="toast-region"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/realtime.js"></script>
  <script src="assets/js/service.js"></script>
  <script src="assets/js/common.js"></script>
  <script>
    let chartProdutos, chartRotatividade;

    async function carregar() {
      const [mesas, chamados, comandasAtivas, relatorios] = await Promise.all([
        Service.listarMesas(),
        Service.listarAtendimentos(),
        Service.listarComandasAtivas(),
        Service.relatorios(),
      ]);

      document.getElementById("kpiGrid").innerHTML = `
        <div class="card"><div class="kpi-value">${mesas.filter(m=>m.status==='LIVRE').length}</div><div class="kpi-label">Mesas livres</div></div>
        <div class="card"><div class="kpi-value">${comandasAtivas.length}</div><div class="kpi-label">Comandas ativas</div></div>
        <div class="card"><div class="kpi-value">${chamados.filter(a=>a.status==='AGUARDANDO').length}</div><div class="kpi-label">Chamados aguardando</div></div>
        <div class="card"><div class="kpi-value">${relatorios.totalComandasFinalizadas ?? '—'}</div><div class="kpi-label">Comandas finalizadas hoje</div></div>
      `;

      document.getElementById("gridMesas").innerHTML = mesas.map((m) => {
        const at = chamados.find((a) => a.mesaId === m.id && a.status !== "FINALIZADO");
        let classe = "livre", tempoTxt = "Livre";
        if (at) {
          const nivel = nivelEspera(at.horario);
          classe = nivel === "danger" ? "urgente" : "aguardando";
          tempoTxt = `Esperando há ${tempoEsperaLabel(at.horario)}`;
        } else if (m.status === "OCUPADA") {
          classe = "ocupada"; tempoTxt = "Ocupada";
        } else if (m.status === "INTERDITADA") {
          classe = "interditada"; tempoTxt = "Interditada";
        }
        return `<div class="mesa-card ${classe}"><div class="mesa-numero">${m.numero}</div><div style="font-size:12px; color:var(--smoke);">${tempoTxt}</div></div>`;
      }).join("");

      renderCharts(relatorios);
    }

    function renderCharts(relatorios) {
      const ctxP = document.getElementById("chartProdutos");
      const ctxR = document.getElementById("chartRotatividade");
      const chartTheme = {
        color: "#F4E9D8",
        grid: "rgba(244,233,216,0.08)",
      };

      if (chartProdutos) chartProdutos.destroy();
      chartProdutos = new Chart(ctxP, {
        type: "bar",
        data: {
          labels: relatorios.produtosMaisVendidos.map((p) => p.nome),
          datasets: [{ label: "Unidades vendidas", data: relatorios.produtosMaisVendidos.map((p) => p.qtd), backgroundColor: "#E8622C", borderRadius: 6 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, title: { display: true, text: "Produtos mais vendidos", color: chartTheme.color, font: { size: 14 } } },
          scales: {
            x: { ticks: { color: chartTheme.color }, grid: { color: chartTheme.grid } },
            y: { ticks: { color: chartTheme.color }, grid: { color: chartTheme.grid } },
          },
        },
      });

      if (chartRotatividade) chartRotatividade.destroy();
      chartRotatividade = new Chart(ctxR, {
        type: "bar",
        data: {
          labels: relatorios.mesasRotatividade.map((m) => `Mesa ${m.mesa}`),
          datasets: [{ label: "Comandas finalizadas", data: relatorios.mesasRotatividade.map((m) => m.qtd), backgroundColor: "#C9A227", borderRadius: 6 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: "y",
          plugins: { legend: { display: false }, title: { display: true, text: "Mesas com maior rotatividade", color: chartTheme.color, font: { size: 14 } } },
          scales: {
            x: { ticks: { color: chartTheme.color }, grid: { color: chartTheme.grid } },
            y: { ticks: { color: chartTheme.color }, grid: { color: chartTheme.grid } },
          },
        },
      });
    }

    Realtime.on("atendimento:novo", carregar);
    Realtime.on("atendimento:atualizado", carregar);
    Realtime.on("pedido:novo", carregar);
    Realtime.on("pedido:atualizado", carregar);
    Realtime.on("comanda:nova", carregar);
    Realtime.on("comanda:atualizada", carregar);

    setInterval(carregar, 20000);
    carregar();
  </script>
</body>
</html>
